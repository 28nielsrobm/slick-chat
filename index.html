<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Slickers Admin</title>
  <style>
    body { font-family: Arial; background: #111; color: #fff; text-align: center; }
    #chat { border: 1px solid #444; height: 300px; overflow-y: scroll; padding: 10px; margin-bottom: 10px; }
    #msg { width: 60%; padding: 5px; }
    button { padding: 5px 10px; margin: 2px; }
    .message { padding: 2px 0; }
    .name { font-weight: bold; color: #0f0; }
  </style>
</head>
<body>

<h1>Slickers Admin</h1>

<!-- Room Controls -->
<input id="roomName" placeholder="Room name">
<button onclick="createRoom()">Create Room</button>
<button onclick="renameRoom()">Rename Room</button>
<button onclick="deleteRoom()">Delete Room</button>

<br><br>

<select id="roomSelect" onchange="changeRoom()"></select>

<div id="chat"></div>

<input id="name" placeholder="Your name">
<br><br>
<input id="msg" placeholder="Type a message">
<button onclick="sendMessage()">Send</button>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDVCyHEJwaGA1BQZnDTlqtcx_0vTGnj7jA",
  authDomain: "slip-chat.firebaseapp.com",
  databaseURL: "https://slip-chat-default-rtdb.firebaseio.com",
  projectId: "slip-chat",
  storageBucket: "slip-chat.firebasestorage.app",
  messagingSenderId: "623395371169",
  appId: "1:623395371169:web:dde6bd4d3f1ae04f3318e0"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let currentRoom = "";
const chatDiv = document.getElementById('chat');
const msgInput = document.getElementById('msg');
const roomSelect = document.getElementById('roomSelect');

// Load room list
db.ref('rooms').on('value', snapshot => {
  roomSelect.innerHTML = "";
  snapshot.forEach(room => {
    const option = document.createElement("option");
    option.value = room.key;
    option.text = room.key;
    roomSelect.appendChild(option);
  });

  if (!currentRoom && roomSelect.value) {
    currentRoom = roomSelect.value;
    loadMessages();
  }
});

function changeRoom() {
  currentRoom = roomSelect.value;
  loadMessages();
}

// Create room
function createRoom() {
  const roomName = document.getElementById('roomName').value;
  if (!roomName) return;
  db.ref('rooms/' + roomName).set({ created: Date.now() });
}

// Delete room
function deleteRoom() {
  if (!currentRoom) return;
  db.ref('rooms/' + currentRoom).remove();
  chatDiv.innerHTML = "";
}

// Rename room
function renameRoom() {
  const newName = document.getElementById('roomName').value;
  if (!currentRoom || !newName) return;

  db.ref('rooms/' + currentRoom).once('value', snapshot => {
    db.ref('rooms/' + newName).set(snapshot.val());
    db.ref('rooms/' + currentRoom).remove();
  });
}

// Load messages
function loadMessages() {
  chatDiv.innerHTML = "";
  db.ref('rooms/' + currentRoom + '/messages').off();

  db.ref('rooms/' + currentRoom + '/messages').on('child_added', snapshot => {
    const message = snapshot.val();
    const id = snapshot.key;

    const div = document.createElement('div');
    div.classList.add('message');
    div.id = id;

    const time = new Date(message.time).toLocaleTimeString();

    div.innerHTML =
      `[${time}] <span class="name">${message.name}:</span> ${message.text}
       <button onclick="deleteMessage('${id}')">Delete</button>`;

    chatDiv.appendChild(div);
    chatDiv.scrollTop = chatDiv.scrollHeight;
  });

  db.ref('rooms/' + currentRoom + '/messages').on('child_removed', snapshot => {
    const msg = document.getElementById(snapshot.key);
    if (msg) msg.remove();
  });
}

// Send message
function sendMessage() {
  const name = document.getElementById('name').value || "Admin";
  const text = msgInput.value;
  if (!text.trim()) return;

  db.ref('rooms/' + currentRoom + '/messages').push({
    name: name,
    text: text,
    time: Date.now()
  });

  msgInput.value = "";
}

// Delete message
function deleteMessage(id) {
  db.ref('rooms/' + currentRoom + '/messages/' + id).remove();
}

// Enter to send
msgInput.addEventListener("keypress", function(e) {
  if (e.key === "Enter") sendMessage();
});
</script>
</body>
</html>
